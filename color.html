<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Generator</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .color-box {
      width: 100%;
      height: 200px;
      border-radius: 16px;
      margin: 20px 0;
      border: 2px solid #333;
      transition: background 0.3s;
    }
    .color-info {
      font-size: 1.2rem;
      font-family: monospace;
      margin: 10px 0;
    }
    .btn {
      padding: 12px 50px;
      border-radius: 30px;
      border: none;
      background: #4d96ff;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    .btn:hover { background: #6baaff; }
    .btn:active { transform: scale(0.95); }
    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: #4d96ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Color Generator</h1>
    <div class="color-box" id="colorBox"></div>
    <div class="color-info" id="colorInfo">#000000</div>
    <button class="btn" onclick="generateColor()">Generate Color</button>
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>
  <script>
    function generateColor() {
      var hex = '#';
      var characters = '0123456789ABCDEF';
      for (var i = 0; i < 6; i++) {
        hex += characters[Math.floor(Math.random() * 16)];
      }
      document.getElementById('colorBox').style.backgroundColor = hex;
      document.getElementById('colorInfo').textContent = hex;
    }
    generateColor();
  </script>
</body>
</html>
