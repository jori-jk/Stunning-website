<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Design Generator</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f1a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 15px;
      font-size: 1.2rem;
      border-radius: 12px;
      border: 2px solid #333;
      background: #1a1a2e;
      color: white;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-group input:focus {
      border-color: #4d96ff;
    }

    .styles-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 20px 0;
    }

    .style-card {
      background: #1a1a2e;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.3s;
    }

    .style-card:hover {
      border-color: #4d96ff;
      transform: scale(1.02);
    }

    .style-card .preview {
      font-size: 1.3rem;
      margin-bottom: 4px;
    }

    .style-card .label {
      font-size: 0.7rem;
      color: #888;
    }

    .style-card.selected {
      border-color: #4d96ff;
      background: #1a1a3e;
    }

    .result-box {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #333;
      margin: 20px 0;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-all;
    }

    .result-box .styled-text {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .btn {
      padding: 12px 50px;
      border-radius: 30px;
      border: none;
      background: #4d96ff;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: #6baaff;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .copy-btn {
      margin-top: 10px;
      padding: 8px 30px;
      border-radius: 30px;
      border: none;
      background: #333;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .copy-btn:hover {
      background: #444;
    }

    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #4d96ff;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Name Design</h1>

    <div class="input-group">
      <input type="text" id="nameInput" placeholder="Enter your name" autofocus>
    </div>

    <div class="styles-grid" id="stylesGrid">
      <!-- Styles will be generated by JavaScript -->
    </div>

    <div class="result-box">
      <div id="result" class="styled-text">Your name will appear here</div>
    </div>

    <button class="btn" onclick="generateName()">Generate</button>
    <button class="copy-btn" onclick="copyName()">Copy Name</button>

    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <script>
    var nameStyles = [
      { name: "Normal", transform: function(text) { return text; } },
      { name: "Bold", transform: function(text) { return "**" + text + "**"; } },
      { name: "Italic", transform: function(text) { return "_" + text + "_"; } },
      { name: "Bold Italic", transform: function(text) { return "***" + text + "***"; } },
      { name: "Strikethrough", transform: function(text) { return "~~" + text + "~~"; } },
      { name: "Circled", transform: function(text) {
          var map = "ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ";
          var normal = "abcdefghijklmnopqrstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Squared", transform: function(text) {
          var map = "🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉";
          var normal = "abcdefghijklmnopqrstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Fullwidth", transform: function(text) {
          var map = "ａｂｃｄｅｆｇｈｉｊｋｌｍｎｏｐｑｒｓｔｕｖｗｘｙｚ";
          var normal = "abcdefghijklmnopqrstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Small Caps", transform: function(text) {
          var map = "ᴀʙᴄᴅᴇғɢʜɪᴊᴋʟᴍɴᴏᴘǫʀsᴛᴜᴠᴡxʏᴢ";
          var normal = "abcdefghijklmnopqrstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Subscript", transform: function(text) {
          var map = "ₐₑₕᵢⱼₖₗₘₙₒₚᵣₛₜᵤᵥₓ";
          var normal = "aehijklmnoprstuvx";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Superscript", transform: function(text) {
          var map = "ᵃᵇᶜᵈᵉᶠᵍʰⁱʲᵏˡᵐⁿᵒᵖʳˢᵗᵘᵛʷˣʸᶻ";
          var normal = "abcdefghijklmnoprstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Double Struck", transform: function(text) {
          var map = "𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫";
          var normal = "abcdefghijklmnopqrstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Fraktur", transform: function(text) {
          var map = "𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷";
          var normal = "abcdefghijklmnopqrstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Monospace", transform: function(text) {
          var map = "𝚊𝚋𝚌𝚍𝚎𝚏𝚐𝚑𝚒𝚓𝚔𝚕𝚖𝚗𝚘𝚙𝚚𝚛𝚜𝚝𝚞𝚟𝚠𝚡𝚢𝚣";
          var normal = "abcdefghijklmnopqrstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index];
            } else {
              result += text[i];
            }
          }
          return result;
        } },
      { name: "Regional Indicator", transform: function(text) {
          var map = "🇦🇧🇨🇩🇪🇫🇬🇭🇮🇯🇰🇱🇲🇳🇴🇵🇶🇷🇸🇹🇺🇻🇼🇽🇾🇿";
          var normal = "abcdefghijklmnopqrstuvwxyz";
          var result = "";
          for (var i = 0; i < text.length; i++) {
            var char = text[i].toLowerCase();
            var index = normal.indexOf(char);
            if (index !== -1) {
              result += map[index * 2] + map[index * 2 + 1];
            } else {
              result += text[i];
            }
          }
          return result;
        } }
    ];

    var selectedStyle = 0;

    function renderStyles() {
      var grid = document.getElementById('stylesGrid');
      grid.innerHTML = '';
      for (var i = 0; i < nameStyles.length; i++) {
        var card = document.createElement('div');
        card.className = 'style-card' + (i === selectedStyle ? ' selected' : '');
        card.innerHTML = '<div class="preview">' + nameStyles[i].transform("Aa") + '</div><div class="label">' + nameStyles[i].name + '</div>';
        card.onclick = function(index) {
          return function() {
            selectedStyle = index;
            renderStyles();
            generateName();
          };
        }(i);
        grid.appendChild(card);
      }
    }

    function generateName() {
      var name = document.getElementById('nameInput').value;
      if (name.trim() === '') {
        document.getElementById('result').textContent = 'Enter a name';
        return;
      }
      var styled = nameStyles[selectedStyle].transform(name);
      document.getElementById('result').textContent = styled;
    }

    function copyName() {
      var name = document.getElementById('result').textContent;
      if (name === 'Enter a name' || name === 'Your name will appear here') return;
      navigator.clipboard.writeText(name).then(function() {
        alert('Name copied!');
      });
    }

    document.getElementById('nameInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') generateName();
    });

    renderStyles();
    generateName();
  </script>

</body>
</html>
