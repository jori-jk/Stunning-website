<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .password-box {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 12px;
      border: 2px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .password-box input {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.2rem;
      font-family: monospace;
      width: 100%;
      outline: none;
    }
    .password-box button {
      background: #4d96ff;
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .password-box button:active { transform: scale(0.9); }
    .options {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
      margin: 20px 0;
    }
    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .option-row label { font-size: 0.9rem; }
    .option-row input[type="range"] { width: 50%; }
    .option-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4d96ff;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 30px;
      border: none;
      background: #4d96ff;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover { background: #6baaff; }
    .btn:active { transform: scale(0.95); }
    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .back-link:hover { color: #4d96ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Password Generator</h1>
    <div class="password-box">
      <input type="text" id="passwordOutput" value="Click Generate" readonly>
      <button onclick="copyPassword()">Copy</button>
    </div>
    <div class="options">
      <div class="option-row">
        <label>Length: <span id="lengthDisplay">12</span></label>
        <input type="range" id="lengthSlider" min="6" max="32" value="12" oninput="updateLength()">
      </div>
      <div class="option-row">
        <label>Uppercase</label>
        <input type="checkbox" id="includeUpper" checked>
      </div>
      <div class="option-row">
        <label>Lowercase</label>
        <input type="checkbox" id="includeLower" checked>
      </div>
      <div class="option-row">
        <label>Numbers</label>
        <input type="checkbox" id="includeNumbers" checked>
      </div>
      <div class="option-row">
        <label>Symbols</label>
        <input type="checkbox" id="includeSymbols" checked>
      </div>
    </div>
    <button class="btn" onclick="generatePassword()">Generate Password</button>
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>
  <script>
    function updateLength() {
      document.getElementById('lengthDisplay').textContent = document.getElementById('lengthSlider').value;
    }
    function generatePassword() {
      var length = document.getElementById('lengthSlider').value;
      var includeUpper = document.getElementById('includeUpper').checked;
      var includeLower = document.getElementById('includeLower').checked;
      var includeNumbers = document.getElementById('includeNumbers').checked;
      var includeSymbols = document.getElementById('includeSymbols').checked;
      var upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      var lower = 'abcdefghijklmnopqrstuvwxyz';
      var numbers = '0123456789';
      var symbols = '!@#$%^&*()_+~`|}{[]:;?><,./-=';
      var charset = '';
      if (includeUpper) charset += upper;
      if (includeLower) charset += lower;
      if (includeNumbers) charset += numbers;
      if (includeSymbols) charset += symbols;
      if (charset === '') {
        document.getElementById('passwordOutput').value = 'Select at least one option';
        return;
      }
      var password = '';
      for (var i = 0; i < length; i++) {
        var randomIndex = Math.floor(Math.random() * charset.length);
        password += charset[randomIndex];
      }
      document.getElementById('passwordOutput').value = password;
    }
    function copyPassword() {
      var password = document.getElementById('passwordOutput').value;
      if (password === 'Click Generate' || password === 'Select at least one option') return;
      navigator.clipboard.writeText(password).then(function() {
        alert('Password copied!');
      });
    }
    generatePassword();
  </script>
</body>
</html>
