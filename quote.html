<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Generator</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f1a;
      color: white;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .quote-box {
      background: #1a1a2e;
      padding: 30px;
      border-radius: 16px;
      border: 2px solid #333;
      margin: 20px 0;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quote-box p {
      font-size: 1.4rem;
      font-style: italic;
      color: #ddd;
      line-height: 1.6;
    }

    .btn {
      padding: 12px 50px;
      border-radius: 30px;
      border: none;
      background: #4d96ff;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: 600;
    }

    .btn:hover {
      background: #6baaff;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover {
      color: #4d96ff;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Quote Generator</h1>

    <div class="quote-box">
      <p id="quoteDisplay">Click Generate to get a quote</p>
    </div>

    <button class="btn" onclick="generateQuote()">Generate Quote</button>

    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <script>
    var quotes = [
      "The only way to do great work is to love what you do. - Steve Jobs",
      "In the middle of difficulty lies opportunity. - Albert Einstein",
      "Success is not final, failure is not fatal: it is the courage to continue that counts. - Winston Churchill",
      "Believe you can and you're halfway there. - Theodore Roosevelt",
      "It does not matter how slowly you go as long as you do not stop. - Confucius",
      "The future belongs to those who believe in the beauty of their dreams. - Eleanor Roosevelt",
      "You miss 100% of the shots you don't take. - Wayne Gretzky",
      "Be yourself; everyone else is already taken. - Oscar Wilde",
      "Two roads diverged in a wood, and I—I took the one less traveled by. - Robert Frost",
      "The best time to plant a tree was 20 years ago. The second best time is now. - Chinese Proverb",
      "It is never too late to be what you might have been. - George Eliot",
      "Do or do not. There is no try. - Yoda",
      "Life is what happens when you're busy making other plans. - John Lennon",
      "Get busy living or get busy dying. - Stephen King",
      "The only thing we have to fear is fear itself. - Franklin D. Roosevelt",
      "That which does not kill us makes us stronger. - Friedrich Nietzsche",
      "You only live once, but if you do it right, once is enough. - Mae West",
      "The secret of getting ahead is getting started. - Mark Twain",
      "It's not whether you get knocked down, it's whether you get up. - Vince Lombardi",
      "The greatest glory in living lies not in never falling, but in rising every time we fall. - Nelson Mandela",
      "The journey of a thousand miles begins with a single step. - Lao Tzu",
      "What you get by achieving your goals is not as important as what you become by achieving your goals. - Zig Ziglar",
      "The only impossible journey is the one you never begin. - Tony Robbins",
      "Your time is limited, so don't waste it living someone else's life. - Steve Jobs",
      "The mind is everything. What you think you become. - Buddha",
      "A person who never made a mistake never tried anything new. - Albert Einstein",
      "Everything you can imagine is real. - Pablo Picasso",
      "You are never too old to set another goal or to dream a new dream. - C.S. Lewis",
      "It's not about the destination, it's about the journey. - Ralph Waldo Emerson",
      "The only way to achieve the impossible is to believe it is possible. - Charles Kingsley",
      "The secret of getting ahead is getting started. - Mark Twain",
      "Success is not the key to happiness. Happiness is the key to success. - Albert Schweitzer",
      "The best way to predict the future is to create it. - Peter Drucker",
      "The greatest pleasure in life is doing what people say you cannot do. - Walter Bagehot",
      "It does not matter how slowly you go as long as you do not stop. - Confucius",
      "The only person you are destined to become is the person you decide to be. - Ralph Waldo Emerson",
      "What you think, you become. What you feel, you attract. What you imagine, you create. - Buddha",
      "The happiness of your life depends upon the quality of your thoughts. - Marcus Aurelius",
      "Be the change that you wish to see in the world. - Mahatma Gandhi",
      "Don't watch the clock; do what it does. Keep going. - Sam Levenson",
      "The greatest gift you can give yourself is the gift of believing in yourself. - Unknown",
      "Fall seven times, stand up eight. - Japanese Proverb",
      "The purpose of our lives is to be happy. - Dalai Lama",
      "Life is short, and it is up to you to make it sweet. - Sarah Louise Delany",
      "The only way to do great work is to love what you do. - Steve Jobs",
      "It is not the length of life, but the depth of life. - Ralph Waldo Emerson",
      "To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment. - Ralph Waldo Emerson",
      "The best revenge is massive success. - Frank Sinatra",
      "What doesn't kill you makes you stronger. - Kelly Clarkson",
      "You are the author of your own story. - Unknown"
    ];

    function generateQuote() {
      var randomIndex = Math.floor(Math.random() * quotes.length);
      document.getElementById('quoteDisplay').textContent = quotes[randomIndex];
    }

    generateQuote();
  </script>

</body>
</html>
