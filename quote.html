<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Quote Generator</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f1a;
      color: white;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .quote-box {
      background: #1a1a2e;
      padding: 30px;
      border-radius: 16px;
      border: 2px solid #333;
      margin: 20px 0;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quote-box p {
      font-size: 1.4rem;
      font-style: italic;
      color: #ddd;
      line-height: 1.6;
    }

    .btn {
      padding: 12px 50px;
      border-radius: 30px;
      border: none;
      background: #4d96ff;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: 600;
    }

    .btn:hover {
      background: #6baaff;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover {
      color: #4d96ff;
    }
  </style>
</head>
